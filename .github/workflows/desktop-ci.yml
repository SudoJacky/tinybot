name: Desktop CI

on:
  pull_request:
    paths:
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - "src/**"
      - "src-tauri/**"
      - "workers/**"
      - "webui/**"
      - ".github/workflows/desktop-ci.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Run native backend desktop smoke
        run: cargo test --manifest-path src-tauri/Cargo.toml desktop_smoke_default_chat_runs_without_ts_compatibility_worker

      - name: Run desktop tests
        shell: bash
        run: |
          set +e
          npm test > test-output.log 2>&1
          status=$?
          tail -n 200 test-output.log
          exit "$status"

      - name: Upload failed desktop test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-test-output
          path: test-output.log
          retention-days: 3

      - name: Build desktop frontend
        run: npm run build
