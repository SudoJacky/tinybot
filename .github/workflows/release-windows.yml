name: Release Windows x64

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      CARGO_HTTP_TIMEOUT: "120"
      CARGO_NET_RETRY: "10"
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release source
        shell: pwsh
        run: |
          git merge-base --is-ancestor "${{ github.sha }}" origin/master
          if ($LASTEXITCODE -ne 0) {
            throw "Release tags must point to a commit on master"
          }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify release version
        run: node .github/scripts/check-release-version.mjs "${{ github.ref_name }}"

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Run updater tests
        working-directory: src-tauri
        run: cargo test --lib desktop_update::tests -- --test-threads=1

      - name: Build and upload signed updater artifacts
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Tinybot Desktop v__VERSION__
          releaseBody: |
            Tinybot Desktop for Windows x64.

            > [!WARNING]
            > Tinybot's Rust backend is under active development. This release may contain breaking changes, and data created by earlier versions may not remain compatible. Back up important `.tinybot` data before upgrading.

            The installer is not Authenticode-signed yet, so Windows SmartScreen may show an unknown publisher warning.
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          updaterJsonPreferNsis: true
          args: --bundles nsis --target x86_64-pc-windows-msvc

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest
